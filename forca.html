<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo das Letras 🌸</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff4d94">
    <style>
        /* ============================================================
           FORCA PAGE — Garden + Pixar Doll Theme
           ============================================================ */

        /* Page background: magical garden image */
        body {
            background-image: url('bg_garden.png');
            background-size: cover;
            background-position: center top;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }

        /* Frosted glass overlay so text is readable */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(255, 240, 255, 0.25);
            backdrop-filter: blur(1px);
            pointer-events: none;
            z-index: 0;
        }

        /* All direct body children above the overlay */
        body>* {
            position: relative;
            z-index: 1;
        }

        /* ── BACK LINK ─────────────────────────────────────────── */
        .back-link {
            position: fixed;
            top: 18px;
            left: 18px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            background: linear-gradient(135deg, #FF4DA6, #9333EA);
            border: 3px solid rgba(255, 255, 255, 0.8);
            padding: 8px 20px;
            border-radius: 30px;
            box-shadow: 0 5px 15px rgba(150, 0, 100, 0.3);
            font-family: 'Bubblegum Sans', cursive;
            transition: all 0.15s;
            z-index: 100;
        }

        .back-link:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .back-link:active {
            transform: translateY(2px);
        }

        /* ── MAIN GAME CARD ────────────────────────────────────── */
        .game-container {
            max-width: 960px;
            margin: 70px auto 40px;
            padding: 30px 28px 35px;
            background: rgba(255, 248, 255, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 40px;
            box-shadow:
                0 8px 32px rgba(150, 0, 150, 0.18),
                0 2px 8px rgba(255, 255, 255, 0.6) inset;
            text-align: center;
            border: 5px solid rgba(255, 255, 255, 0.9);
        }

        /* ── TITLE ─────────────────────────────────────────────── */
        .game-title {
            color: #FFD700;
            text-shadow:
                2px 2px 0 #FF4DA6,
                -1px -1px 0 #9333EA,
                0 4px 0 #CC007A;
            margin-bottom: 16px;
            font-size: 3.2rem;
            font-family: 'Bubblegum Sans', cursive;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.15));
        }

        /* ── CATEGORY HINT ─────────────────────────────────────── */
        .category-hint {
            background: linear-gradient(135deg, #FF4DA6, #9333EA);
            display: inline-block;
            padding: 7px 26px;
            border-radius: 30px;
            font-size: 1.1rem;
            font-family: 'Bubblegum Sans', cursive;
            letter-spacing: 1px;
            margin-bottom: 14px;
            color: white;
            border: 3px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 4px 12px rgba(150, 0, 100, 0.25);
            text-transform: uppercase;
        }

        /* ── HEARTS ────────────────────────────────────────────── */
        .mistakes-indicator {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-bottom: 14px;
        }

        .heart {
            font-size: 2rem;
            transition: transform 0.3s, filter 0.3s;
            filter: drop-shadow(0 2px 4px rgba(220, 0, 100, 0.4));
        }

        .heart.lost {
            filter: grayscale(1) opacity(0.3);
            transform: scale(0.75);
        }

        /* ── DOLL STAGE ─────────────────────────────────────────── */
        .hangman-box {
            position: relative;
            height: 340px;
            margin-bottom: 24px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            overflow: hidden;
        }

        /* The doll image — always in DOM, fully visible */
        .doll-img {
            height: 320px;
            width: auto;
            object-fit: contain;
            display: block;
            filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.25));
            position: relative;
            z-index: 2;
        }

        /*
         * Progressive reveal: we lay 7 "mystery blocks" on top of the doll,
         * each covering a zone. They start visible (hiding the doll zone)
         * and disappear one-by-one as wrong guesses happen.
         *
         * Because the doll image is 320px tall, we divide it into 7 bands
         * from bottom to top (wrong guess 1 = shoes, ..., 7 = hair/head).
         */
        .doll-wrapper {
            position: relative;
            height: 320px;
            width: 320px;
            display: flex;
            align-items: flex-end;
        }

        /* Each mask strip covers part of the doll */
        .mask-strip {
            position: absolute;
            left: 0;
            right: 0;
            border-radius: 16px;
            transition: opacity 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275),
                transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 3;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }

        .mask-strip.revealed {
            opacity: 0;
            transform: scale(1.25);
            pointer-events: none;
        }

        /* Zone heights (bottom to top of a 320px image) for 6 steps */
        #mask-1 {
            bottom: 0;
            height: 54px;
            background: linear-gradient(135deg, rgba(255, 180, 220, 0.92), rgba(200, 130, 255, 0.92));
        }

        #mask-2 {
            bottom: 54px;
            height: 54px;
            background: linear-gradient(135deg, rgba(255, 150, 220, 0.92), rgba(180, 100, 255, 0.92));
        }

        #mask-3 {
            bottom: 108px;
            height: 54px;
            background: linear-gradient(135deg, rgba(255, 120, 200, 0.92), rgba(160, 80, 240, 0.92));
        }

        #mask-4 {
            bottom: 162px;
            height: 54px;
            background: linear-gradient(135deg, rgba(255, 90, 180, 0.92), rgba(140, 60, 220, 0.92));
        }

        #mask-5 {
            bottom: 216px;
            height: 54px;
            background: linear-gradient(135deg, rgba(255, 60, 160, 0.92), rgba(120, 40, 200, 0.92));
        }

        #mask-6 {
            bottom: 270px;
            height: 50px;
            background: linear-gradient(135deg, rgba(240, 40, 140, 0.92), rgba(100, 20, 180, 0.92));
        }

        /* Question marks on masks */
        .mask-strip::after {
            content: '?';
            font-family: 'Bubblegum Sans', cursive;
            font-size: 1.8rem;
            color: rgba(255, 255, 255, 0.6);
        }

        /* ── WORD DISPLAY ──────────────────────────────────────── */
        .word-display {
            font-size: 3rem;
            letter-spacing: 18px;
            margin-bottom: 28px;
            font-family: 'Bubblegum Sans', cursive;
            color: #7C3AED;
            text-shadow: 2px 2px 0 white, 4px 4px 0 rgba(0, 0, 0, 0.08);
        }

        /* ── KEYBOARD ──────────────────────────────────────────── */
        .keyboard {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            max-width: 640px;
            margin: 0 auto;
        }

        .key {
            background: linear-gradient(to bottom, #fff 0%, #fce7ff 100%);
            border: 3px solid #C084FC;
            color: #7C3AED;
            padding: 10px 14px;
            border-radius: 14px;
            font-size: 1.35rem;
            font-weight: 900;
            font-family: 'Bubblegum Sans', cursive;
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 0 5px 0 #9333EA;
            min-width: 52px;
            text-transform: uppercase;
        }

        .key:hover:not(:disabled) {
            transform: scale(1.08) translateY(-2px);
            background: linear-gradient(to bottom, #fce7ff, #e9d5ff);
        }

        .key:active:not(:disabled) {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #9333EA;
        }

        .key:disabled {
            cursor: default;
            transform: translateY(3px);
            box-shadow: 0 2px 0 #9333EA;
            opacity: 0.55;
        }

        .key.correct {
            background: linear-gradient(to bottom, #86efac, #4ade80);
            border-color: #15803d;
            color: white;
            box-shadow: 0 5px 0 #15803d;
            text-shadow: 1px 1px 0 rgba(0, 0, 0, 0.15);
        }

        .key.correct:disabled {
            box-shadow: 0 2px 0 #15803d;
        }

        .key.wrong {
            background: linear-gradient(to bottom, #FF4DA6, #CC007A);
            border-color: #CC007A;
            color: white;
            box-shadow: 0 5px 0 #990062;
            text-shadow: 1px 1px 0 rgba(0, 0, 0, 0.15);
        }

        .key.wrong:disabled {
            box-shadow: 0 2px 0 #990062;
        }

        /* ── MESSAGE ───────────────────────────────────────────── */
        .message {
            font-size: 1.7rem;
            margin-top: 24px;
            font-weight: bold;
            min-height: 2em;
            color: #CC007A;
            font-family: 'Bubblegum Sans', cursive;
        }

        /* ── RESET BUTTON ──────────────────────────────────────── */
        .reset-btn {
            margin-top: 22px;
            padding: 14px 38px;
            font-size: 1.4rem;
            background: linear-gradient(135deg, #FF4DA6, #9333EA);
            color: white;
            border: 4px solid rgba(255, 255, 255, 0.8);
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(150, 0, 100, 0.25);
            font-family: 'Bubblegum Sans', cursive;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 1px 1px 0 rgba(0, 0, 0, 0.2);
            display: none;
            transition: all 0.15s;
        }

        .reset-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.08);
        }

        .reset-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 10px rgba(150, 0, 100, 0.25);
        }

        /* ── LAYOUT: centralizado total (BONECA NO TOPO) ─────────────── */
        .game-inner {
            display: grid !important;
            grid-template-columns: 1fr !important;
            justify-items: center !important;
            gap: 40px !important;
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
        }

        .game-left,
        .game-right {
            width: 100% !important;
            max-width: 700px !important;
            display: grid !important;
            justify-items: center !important;
            text-align: center !important;
        }

        .hangman-box {
            display: flex !important;
            justify-content: center !important;
            align-items: center !important;
            width: 100%;
            margin-bottom: 0 !important;
        }

        @media (max-width: 700px) {
            .game-inner {
                flex-direction: column;
                align-items: center;
            }

            .game-left {
                flex: unset;
            }

            .hangman-box {
                height: 260px;
            }

            .doll-img {
                height: 250px;
            }

            #mask-1 {
                height: 40px;
            }

            #mask-2 {
                bottom: 40px;
                height: 44px;
            }

            #mask-3 {
                bottom: 84px;
                height: 48px;
            }

            #mask-4 {
                bottom: 132px;
                height: 44px;
            }

            #mask-5 {
                bottom: 176px;
                height: 40px;
            }

            #mask-6 {
                bottom: 216px;
                height: 25px;
            }

            #mask-7 {
                bottom: 241px;
                height: 14px;
            }

            .doll-wrapper {
                height: 255px;
                width: 255px;
            }

            .game-title {
                font-size: 2.4rem;
            }

            .word-display {
                font-size: 2.2rem;
            }
        }

        @media (max-width: 450px) {
            .game-container {
                padding: 20px 15px;
                margin-top: 50px;
            }

            .hangman-box {
                height: 210px;
            }

            .doll-img {
                height: 200px;
            }

            .doll-wrapper {
                height: 200px;
                width: 200px;
            }

            #mask-1 {
                height: 32px;
            }

            #mask-2 {
                bottom: 32px;
                height: 35px;
            }

            #mask-3 {
                bottom: 67px;
                height: 38px;
            }

            #mask-4 {
                bottom: 105px;
                height: 35px;
            }

            #mask-5 {
                bottom: 140px;
                height: 32px;
            }

            #mask-6 {
                bottom: 172px;
                height: 28px;
            }

            .game-title {
                font-size: 1.8rem;
                margin-bottom: 10px;
            }

            .category-hint {
                font-size: 0.9rem;
                padding: 5px 16px;
                margin-bottom: 20px;
            }

            .word-display {
                font-size: 1.5rem;
                letter-spacing: 8px;
                margin-bottom: 20px;
            }

            .key {
                min-width: 40px;
                padding: 6px 8px;
                font-size: 1rem;
                border-width: 2px;
                border-radius: 8px;
            }

            .keyboard {
                gap: 6px;
            }

            .message {
                font-size: 1.3rem;
            }

            .reset-btn {
                font-size: 1rem;
                padding: 10px 20px;
            }

            .back-link {
                font-size: 0.9rem;
                padding: 6px 14px;
                top: 10px;
                left: 10px;
            }
        }
    </style>
</head>

<body>
    <a href="index.html" class="back-link">← Voltar</a>

    <div class="game-container">
        <h1 class="game-title">🌸 Jogo das Letras 🌸</h1>
        <div id="category" class="category-hint">Carregando...</div>

        <div class="game-inner">
            <!-- LEFT: Doll reveal -->
            <div class="game-left">
                <div class="hangman-box">
                    <div class="doll-wrapper">
                        <!-- The doll itself -->
                        <img src="doll.png" class="doll-img" alt="Boneca" id="dollImg" />

                        <!-- Mystery masks — covering zones from bottom to top -->
                        <div class="mask-strip" id="mask-1"></div>
                        <div class="mask-strip" id="mask-2"></div>
                        <div class="mask-strip" id="mask-3"></div>
                        <div class="mask-strip" id="mask-4"></div>
                        <div class="mask-strip" id="mask-5"></div>
                        <div class="mask-strip" id="mask-6"></div>
                    </div>
                </div>

                <!-- Word display beside the doll on small screens, under on large -->
                <div id="wordDisplay" class="word-display">_ _ _ _ _</div>
            </div>

            <!-- RIGHT: Keyboard + message + button -->
            <div class="game-right">
                <div class="keyboard" id="keyboard"></div>
                <div id="message" class="message"></div>
                <button id="resetBtn" class="reset-btn">Jogar de Novo! 💖</button>
            </div>
        </div>
        <footer style="margin-top: 40px; color: #CC007A; font-family: 'Bubblegum Sans', cursive; font-size: 1.2rem;">
            Feito com ❤️ pelo Papai para você!
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="forca.js?v=4"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .catch(err => console.log('SW registration failed: ', err));
            });
        }
    </script>
</body>

</html>
