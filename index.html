<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Jogos Mágicos 🌈</title>
    <meta name="description" content="Um portal de jogos educativos e divertidos para crianças.">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌈</text></svg>">
</head>
<body>
    <div class="portal-container">
        <header>
            <h1 class="logo">Portal Mágico ✨</h1>
            <p class="subtitle">Bem-vinda ao seu mundo de diversão!</p>
        </header>

        <main class="games-grid">
            <!-- Jogo da Forca -->
            <a href="forca_v3.html" class="game-card" id="game-forca">
                <div class="game-icon">🔠</div>
                <h2>Jogo da Forca</h2>
                <p style="margin-bottom: 20px; color: #666;">Descubra a palavra secreta!</p>
                <div class="play-btn">Jogar Agora! 🚀</div>
            </a>

            <!-- Mais jogos podem ser adicionados aqui no futuro -->
            <div class="game-card" style="opacity: 0.6; filter: grayscale(1); cursor: default;">
                <div class="game-icon">🎨</div>
                <h2>Pintura Mágica</h2>
                <p style="margin-bottom: 20px; color: #666;">Em breve...</p>
                <div class="play-btn" style="background-color: #ccc; box-shadow: none;">Bloqueado</div>
            </div>
            
            <div class="game-card" style="opacity: 0.6; filter: grayscale(1); cursor: default;">
                <div class="game-icon">🧩</div>
                <h2>Quebra-Cabeça</h2>
                <p style="margin-bottom: 20px; color: #666;">Em breve...</p>
                <div class="play-btn" style="background-color: #ccc; box-shadow: none;">Bloqueado</div>
            </div>
        </main>

        <footer style="margin-top: 80px; color: #CC007A; font-family: 'Bubblegum Sans', cursive; font-size: 1.2rem;">
            Feito com ❤️ pelo Papai para você!
        </footer>
    </div>
</body>
</html>
