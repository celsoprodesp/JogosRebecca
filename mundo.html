<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundo Mágico ✨</title>
    <link rel="stylesheet" href="style.css?v=2">
    <!-- Globe.gl standalone bundle (includes Three.js) -->
    <script src="https://unpkg.com/globe.gl"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: radial-gradient(circle, #fdf2ff 0%, #FAD7F7 100%);
            font-family: 'Quicksand', sans-serif;
        }
        #globe-container {
            width: 100vw;
            height: 100vh;
        }
        .ui-overlay {
            position: fixed;
            inset: 0;
            padding: 30px;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* Distribui topo, centro e base */
            align-items: center;
            z-index: 100;
        }
        .header-controls {
            width: 100%;
            display: flex;
            justify-content: flex-end;
            align-items: flex-start;
            pointer-events: none; /* Deixa cliques passarem, exceto nos filhos com auto */
        }
        /* Voltar link estilizado globalmente em style.css */
        .info-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(5px);
            padding: 20px;
            border-radius: 30px;
            border: 4px solid var(--lavender);
            max-width: 350px;
            pointer-events: auto;
            text-align: center;
            display: none;
            align-self: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .info-panel h2 {
            margin-bottom: 5px;
            color: var(--pink-dark);
            font-size: 2.2rem;
            font-family: 'Bubblegum Sans', cursive;
        }
        .info-panel .flag { font-size: 4rem; margin: 10px 0; display: block; }
        .challenge-box {
            background: var(--gold);
            padding: 15px 30px;
            border-radius: 50px;
            border: 4px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            pointer-events: auto;
            align-self: center;
            font-size: 1.5rem;
            font-family: 'Bubblegum Sans', cursive;
            color: var(--pink-dark);
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="globe-container"></div>

    <div class="ui-overlay">
        <div class="header-controls">
            <a href="index.html" class="back-link" style="pointer-events: auto;">← Voltar</a>
        </div>

        <div id="info-panel" class="info-panel">
            <span id="country-flag" class="flag"></span>
            <h2 id="country-name">País Mágico</h2>
            <p id="challenge-feedback" style="color: #666; font-size: 1.1rem;"></p>
        </div>

        <div id="challenge-btn" class="challenge-box">Me dê um desafio! ✨</div>
    </div>

    <script src="mundo.js"></script>
</body>
</html>
