<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quebra-Cabeça Mágico 🧩</title>
    <link rel="stylesheet" href="style.css?v=2">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff4d94">
    <style>
        .back-link {
            position: fixed;
            top: 18px;
            left: 18px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            background: linear-gradient(135deg, #FF4DA6, #9333EA);
            border: 3px solid rgba(255, 255, 255, 0.8);
            padding: 8px 20px;
            border-radius: 30px;
            box-shadow: 0 5px 15px rgba(150, 0, 100, 0.3);
            font-family: 'Bubblegum Sans', cursive;
            transition: all 0.15s;
            z-index: 100;
        }

        .back-link:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .game-container {
            max-width: 960px;
            margin: 70px auto 40px;
            padding: 30px 28px 35px;
            background: rgba(255, 248, 255, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            box-shadow: 0 8px 32px rgba(150, 0, 150, 0.18), 0 2px 8px rgba(255, 255, 255, 0.6) inset;
            text-align: center;
            border: 5px solid rgba(255, 255, 255, 0.9);
        }

        .game-title {
            color: #FFD700;
            text-shadow: 2px 2px 0 #FF4DA6, -1px -1px 0 #9333EA, 0 4px 0 #CC007A;
            margin-bottom: 16px;
            font-size: 3.2rem;
            font-family: 'Bubblegum Sans', cursive;
        }

        .gallery {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            overflow-x: auto;
            max-width: 100%;
            padding: 10px;
            justify-content: center;
        }

        .gallery-item {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            border: 4px solid white;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s, border-color 0.2s;
            background-color: white;
            flex-shrink: 0;
            object-fit: cover;
        }

        .gallery-item:hover, .gallery-item.active {
            transform: translateY(-5px);
            border-color: var(--pink-hot, #FF4DA6);
        }

        .puzzle-board {
            width: 300px;
            height: 300px;
            margin: 0 auto;
            display: grid;
            /* grid-template-columns set by JS */
            /* grid-template-rows set by JS */
            gap: 0;
            background: #fff;
            border: 5px solid rgba(255, 255, 255, 0.9);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            touch-action: none; /* Prevent scrolling when dragging pieces */
        }

        .puzzle-piece {
            width: 100%;
            height: 100%;
            background-size: 300px 300px;
            background-repeat: no-repeat;
            cursor: pointer;
            transition: transform 0.1s;
            position: relative;
        }

        .puzzle-piece.selected {
            outline: 3px solid #9333EA;
            transform: scale(0.95);
            z-index: 2;
        }

        .puzzle-ghost {
            position: fixed;
            pointer-events: none;
            z-index: 1000;
            opacity: 0.8;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            border-radius: 12px;
            border: 3px solid #FF4DA6;
        }

        .hidden {
            display: none !important;
        }

        .message {
            font-size: 1.5rem;
            color: #9333EA;
            font-family: 'Bubblegum Sans', cursive;
            margin-top: 20px;
            height: 30px;
        }

        @media (max-width: 450px) {
            .puzzle-board {
                width: 270px;
                height: 270px;
            }
            .puzzle-piece {
                background-size: 270px 270px;
            }
            .gallery-item {
                width: 60px;
                height: 60px;
            }
        }

        .difficulty-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .difficulty-btn {
            background: white;
            border: 3px solid #FF4DA6;
            color: #9333EA;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Bubblegum Sans', cursive;
            font-size: 1rem;
            transition: all 0.2s;
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
        }

        .difficulty-btn:hover {
            transform: translateY(-2px);
            background: #FFF0F6;
        }

        .difficulty-btn.active {
            background: #FF4DA6;
            color: white;
            box-shadow: 0 4px 10px rgba(255, 77, 166, 0.4);
        }
    </style>
</head>

<body>
    <a href="index.html" class="back-link">← Voltar</a>

    <div class="game-container">
        <h1 class="game-title">🧩 Quebra-Cabeça 🧩</h1>
        <p style="font-family: 'Bubblegum Sans', cursive; font-size: 1.2rem; color: #9333EA; margin-bottom: 20px;">
            Escolha uma imagem e arraste as peças para trocá-las de lugar!
        </p>

        <div class="gallery" id="puzzleGallery">
            <img src="arca_noe_color.png" class="gallery-item active" data-img="arca_noe_color.png" alt="Arca de Noé">
            <img src="jonas_baleia_color.png" class="gallery-item" data-img="jonas_baleia_color.png" alt="Jonas e a Baleia">
            <img src="davi_golias_color.png" class="gallery-item" data-img="davi_golias_color.png" alt="Davi e Golias">
            <img src="moises_mar_color.png" class="gallery-item" data-img="moises_mar_color.png" alt="Moisés Abrindo o Mar">
        </div>

        <div class="difficulty-selector" id="difficultySelector">
            <button class="difficulty-btn" data-size="2">Fácil (2x2)</button>
            <button class="difficulty-btn active" data-size="3">Médio (3x3)</button>
            <button class="difficulty-btn" data-size="4">Difícil (4x4)</button>
            <button class="difficulty-btn" data-size="5">Mestre (5x5)</button>
        </div>

        <div class="puzzle-board" id="puzzleBoard">
            <!-- Pieces added by JS -->
        </div>

        <div class="message" id="messageBox">Pode começar!</div>

        <footer style="margin-top: 40px; color: #CC007A; font-family: 'Bubblegum Sans', cursive; font-size: 1.2rem;">
            Feito com ❤️ pelo Papai para você!
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="puzzle.js?v=2"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js?v=3')
                    .catch(err => console.log('SW registration failed: ', err));
            });
        }
    </script>
</body>

</html>
